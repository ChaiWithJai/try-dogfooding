name: cx-triage
description: >
  Triage customer support tickets — categorize by urgency, draft responses,
  and surface patterns. Works with CSV exports from any ticketing system.
persona: cx
stack_requires: []
claude_code_config:
  allowed_tools: []
  max_tokens_per_run: 50000
  timeout_seconds: 120
inputs:
  - name: tickets
    description: >
      Path to a CSV file with ticket data, or paste ticket text directly.
      Expected columns: id, subject, body, created_at, customer_email (optional).
    default: null
outputs:
  - name: triage-report
    destination: stdout
    format: markdown
  - name: triage-report-file
    destination: outputs/triage-report.md
    format: markdown
schedule: null
